plugins {
    id 'com.android.application'
}

android {
    namespace 'com.fountainsim'
    compileSdk 34

    defaultConfig {
        applicationId 'com.fountainsim'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
